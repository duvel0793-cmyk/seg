project:
  name: dabqn_lite_convnextv2_small
  output_dir: /home/lky/code/dabqn_evidence_damage_classifier/outputs/dabqn_lite_convnextv2_small

data:
  root: /home/lky/data/xBD
  train_list: /home/lky/data/xBD/xBD_list/train_all.txt
  val_list: /home/lky/data/xBD/xBD_list/val_all.txt
  test_list: /home/lky/data/xBD/xBD_list/test_all.txt

dataset:
  image_size: 512
  min_polygon_area: 16.0
  min_mask_pixels: 8
  allow_tier3: false
  debug_subset: 0

augmentation:
  hflip_prob: 0.5
  vflip_prob: 0.1
  rotate90_prob: 0.5
  color_jitter_prob: 0.3
  brightness: 0.12
  contrast: 0.12
  saturation: 0.08
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

model:
  backbone: convnextv2_small.fcmae_ft_in22k_in1k
  pretrained: false
  hidden_dim: 256
  pixel_dim: 256
  num_queries: 150
  query_decoder_layers: 4
  query_decoder_heads: 8
  dropout: 0.1
  crop_feature_size: 7
  damage_branch_type: mask_pool
  damage_head_type: corn
  use_gt_mask_warmup: true
  gt_warmup_epochs: 3
  damage_scale_factors:
    tight: 1.05
    context: 2.0
    neighborhood: 4.0

matcher:
  cost_objectness: 1.0
  cost_box_l1: 5.0
  cost_giou: 2.0
  cost_mask: 2.0
  cost_dice: 5.0
  add_damage_cost: false
  cost_damage: 0.0

loss:
  obj_weight: 1.0
  box_l1_weight: 5.0
  giou_weight: 2.0
  mask_bce_weight: 2.0
  dice_weight: 5.0
  damage_weight: 1.0
  eos_coef: 0.1

training:
  stage: joint
  epochs: 20
  batch_size: 2
  num_workers: 4
  init_checkpoint: ""
  lr: 1.0e-4
  backbone_lr: 2.0e-5
  new_module_lr: 1.0e-4
  weight_decay: 0.05
  warmup_epochs: 2
  min_lr_ratio: 0.01
  grad_clip_norm: 1.0
  amp: true
  amp_dtype: bf16
  ema_enabled: true
  ema_decay: 0.999
  seed: 42
  freeze_backbone: false
  freeze_localizer: false

eval:
  split: val
  batch_size: 2
  num_workers: 2
  objectness_threshold: 0.35
  mask_threshold: 0.5
  top_k_predictions: 100
  save_best_by: bridge_score
