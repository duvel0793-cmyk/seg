project:
  name: evidence_hierarchical_damage_classifier
  output_dir: outputs/evidence_hier_corn

data:
  root: /home/lky/data/xBD
  train_list: /home/lky/data/xBD/xBD_list/train_all.txt
  val_list: /home/lky/data/xBD/xBD_list/val_all.txt
  use_pixel_targets: true
  ignore_index: 255

dataset:
  crop_scales:
    tight:
      output_size: 224
      context_factor: 1.05
    context:
      output_size: 224
      context_factor: 2.0
    neighborhood:
      output_size: 256
      context_factor: 4.0
  input_mode: rgbm
  num_classes: 4

model:
  backbone: convnextv2_tiny.fcmae_ft_in22k_in1k
  pretrained: true
  input_mode: rgbm
  use_tight_branch: true
  use_context_branch: true
  use_neighborhood_branch: true
  use_cross_scale_attention: true
  use_evidence_head: true
  use_hierarchical_head: true
  use_global_corn_aux: true
  feature_dim: 768
  token_dim: 256
  evidence_dim: 128
  dropout: 0.1

loss:
  binary_damage_weight: 1.0
  severity_corn_weight: 1.0
  final_ce_weight: 0.5
  global_corn_aux_weight: 0.2
  evidence_pixel_weight: 0.1
  evidence_mil_weight: 0.1
  severity_map_weight: 0.05
  damage_aux_weight: 0.1
  unchanged_weight: 0.02
  gate_bg_weight: 0.01
  gate_contrast_weight: 0.01

training:
  epochs: 20
  batch_size: 8
  num_workers: 8
  optimizer: adamw
  lr: 2.0e-4
  weight_decay: 0.05
  warmup_epochs: 2
  scheduler: warmup_cosine
  amp: true
  amp_dtype: bf16
  grad_clip_norm: 1.0
  ema_enabled: true
  ema_decay: 0.999
  early_stop_metric: ema_macro_f1
  early_stop_patience: 6
  seed: 42

eval:
  batch_size: 8
  num_workers: 8
  validate_ema: true
  validate_raw: true
  validate_ema_every: 1
  validate_raw_every: 1
  save_best_by: ema_macro_f1

logging:
  log_interval: 50
  save_history_jsonl: true
  save_evidence_preview: false
  log_heavy_diagnostics: false
