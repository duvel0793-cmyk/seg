project:
  name: evidence_clean_v1_next_bdfm_edqa
  output_dir: outputs/evidence_clean_v1_next_bdfm_edqa

data:
  root: /home/lky/data/xBD
  train_list: /home/lky/data/xBD/xBD_list/train_all.txt
  val_list: /home/lky/data/xBD/xBD_list/val_all.txt
  use_pixel_targets: true
  ignore_index: 255
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

dataset:
  input_mode: rgbm
  crop_scales:
    tight:
      enabled: true
      output_size: 256
      context_factor: 1.05
    context:
      enabled: true
      output_size: 192
      context_factor: 2.0
    neighborhood:
      enabled: false
      output_size: 224
      context_factor: 4.0

model:
  backbone: convnextv2_tiny.fcmae_ft_in22k_in1k
  pretrained: true
  input_mode: rgbm
  feature_dim: 768
  token_dim: 256
  evidence_dim: 128
  dropout: 0.1
  use_tight_branch: true
  use_context_branch: true
  use_neighborhood_branch: false
  enable_alignment: false
  enable_prepost_fusion: true
  fusion_mode: simple_diff_concat
  change_block_type: bdfm_lite
  enable_damage_bdfm_lite: true
  enable_damage_aware_block: true
  enable_change_gate: true
  enable_edqa_lite: true
  edqa_lite_scales: ["context"]
  edqa_lite_window_size: 7
  edqa_lite_heads: 4
  edqa_lite_init_alpha: 0.1
  use_cross_scale_attention: true
  cross_scale_heads: 4
  cross_scale_layers: 1
  cross_scale_fusion_mode: tight_query_context_kv
  use_evidence_head: true
  evidence_scales: ["tight", "context"]
  evidence_fusion_mode: gated_residual
  evidence_gate_init_logit: -4.0
  enable_feature_calibration: false
  use_hierarchical_head: false
  head_type: flat_corn
  use_global_corn_aux: false
  enable_minor_boundary_aux: true
  use_structural_two_stage_head: true
  structural_two_stage_hidden_dim: 768
  structural_two_stage_dropout: 0.1
  structural_two_stage_use_for_prediction: false
  structural_two_stage_prob_mix_weight: 0.0
  use_severity_aware_scale_router: false
  tight_token_count: 8
  context_token_count: 12
  neighborhood_token_count: 12
  local_attention_heads: 4
  local_attention_layers: 1
  local_attention_layers_tight: 0
  local_attention_layers_context: 1
  local_attention_layers_neighborhood: 0
  tight_window_size: 7
  context_window_size: 7
  neighborhood_window_size: 8

loss:
  corn_weight: 1.0
  final_ce_weight: 0.3
  final_class_weight_mode: dataset_sqrt_inverse
  binary_damage_weight: 0.0
  severity_corn_weight: 0.0
  global_corn_aux_weight: 0.0
  evidence_pixel_weight: 0.05
  evidence_mil_weight: 0.05
  severity_map_weight: 0.05
  damage_aux_weight: 0.02
  minor_no_aux_weight: 0.10
  minor_major_aux_weight: 0.05
  structural_binary_weight: 0.3
  low_stage_weight: 0.2
  high_stage_weight: 0.2
  scale_router_ce_weight: 0.0
  unchanged_weight: 0.0
  gate_bg_weight: 0.0
  gate_contrast_weight: 0.0

training:
  epochs: 20
  batch_size: 16
  num_workers: 8
  optimizer: adamw
  backbone_lr: 5.0e-5
  new_module_lr: 2.0e-4
  weight_decay: 0.05
  warmup_epochs: 2
  scheduler: warmup_cosine
  min_lr_ratio: 0.01
  grad_clip_norm: 1.0
  amp: true
  amp_dtype: bf16
  ema_enabled: true
  ema_decay: 0.999
  channels_last: true
  early_stop_metric: ema_macro_f1
  early_stop_patience: 6
  seed: 42

eval:
  batch_size: 8
  num_workers: 8
  validate_ema: true
  validate_raw: true
  save_best_by: ema_macro_f1
  save_diagnostics: true
  damage_threshold_sweep: false
  save_visuals: false
