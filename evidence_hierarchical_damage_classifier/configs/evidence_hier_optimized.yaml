project:
  name: evidence_hierarchical_damage_classifier
  output_dir: outputs/evidence_hier_optimized

data:
  root: /home/ubuntu/code/lky/data/xBD
  train_list: /home/ubuntu/code/lky/data/xBD/xBD_list/train_all.txt
  val_list: /home/ubuntu/code/lky/data/xBD/xBD_list/val_all.txt
  use_pixel_targets: true
  ignore_index: 255

dataset:
  crop_scales:
    tight:
      output_size: 224
      context_factor: 1.05
    context:
      output_size: 224
      context_factor: 2.0
    neighborhood:
      output_size: 224
      context_factor: 4.0

data:
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

model:
  evidence_fusion_mode: gated_residual
  evidence_gate_init_logit: -4.0
  enable_feature_calibration: true
  enable_minor_boundary_aux: true
  evidence_scales: ["tight", "context"]
  local_attention_layers: 1
  damage_decision_threshold: 0.5

loss:
  binary_damage_weight: 1.0
  severity_corn_weight: 1.0
  final_ce_weight: 0.5
  final_class_weight_mode: dataset_sqrt_inverse
  global_corn_aux_weight: 0.2
  evidence_pixel_weight: 0.02
  evidence_mil_weight: 0.03
  severity_map_weight: 0.01
  damage_aux_weight: 0.1
  evidence_schedule:
    enabled: true
    warmup_epochs: 5
    ramp_epochs: 8
  evidence_pixel_class_mode: weak_minor_major
  evidence_pixel_every_n_steps: 2
  minor_no_aux_weight: 0.05
  minor_major_aux_weight: 0.05
  unchanged_weight: 0.005
  gate_bg_weight: 0.003
  gate_contrast_weight: 0.003
  gate_contrast_margin: 0.15

training:
  epochs: 20
  warmup_epochs: 2
  backbone_lr: 5.0e-5
  new_module_lr: 2.0e-4
  weight_decay: 0.05
  grad_clip_norm: 1.0
  amp: true
  ema_enabled: true
  ema_decay: 0.999
  channels_last: true
  compile_model: false

eval:
  damage_threshold_sweep: true
  damage_threshold_values: [0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60]
  apply_best_damage_threshold: none
  save_visuals: false
  save_diagnostics: true
