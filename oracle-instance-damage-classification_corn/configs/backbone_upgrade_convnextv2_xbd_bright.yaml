project_name: oracle-instance-damage-classification_corn
seed: 42

data:
  root_dir: /home/lky/data/xBD
  xbd_root: /home/lky/data/xBD
  bright_root: /home/lky/data/BRIGHT
  train_list: /home/lky/data/xBD/xBD_list/train_all.txt
  val_list: /home/lky/data/xBD/xBD_list/val_all.txt
  train_source: xbd_bright_mixed
  eval_source: xbd_only
  source_ratio:
    xbd: 1
    bright: 1
  instance_source: gt_json
  allow_tier3: false
  image_size: 224
  context_ratio: 0.25
  min_polygon_area: 16.0
  min_mask_pixels: 16
  max_out_of_bound_ratio: 0.4
  cache_dir: ./cache
  bright:
    train_list: null
    val_list: null
    test_list: null
    train_ratio: 0.8
    val_ratio: 0.1
    split_seed: 42
    target_mode: categorical_damage_mask
    positive_class_name: null
    label_mapping:
      1: minor-damage
      2: major-damage
      3: destroyed
    post_convert_mode: grayscale_to_rgb
    component_connectivity: 2

input_mode:
  use_dual_scale: true
  local_size: 224
  context_size: 224
  local_margin_ratio: 0.15
  context_scale: 2.5
  min_crop_size: 32

geometry_prior:
  use_instance_mask: true
  use_boundary_prior: true
  encoder_in_channels: 5
  boundary_width_px: 3
  dilation_radius: 3
  erosion_radius: 1

diff_input:
  return_abs_diff: true
  feed_abs_diff_to_model: false

augmentation:
  hflip_prob: 0.5
  vflip_prob: 0.5
  rotate90_prob: 0.5
  random_resized_crop_prob: 0.5
  random_resized_crop_scale: [0.9, 1.0]
  random_resized_crop_ratio: [0.95, 1.05]
  min_mask_retention: 0.75
  color_jitter_prob: 0.6
  brightness: 0.15
  contrast: 0.15
  saturation: 0.1
  hue: 0.02
  context_dropout_prob: 0.0
  context_blur_prob: 0.0
  context_grayscale_prob: 0.0
  context_noise_prob: 0.0
  context_mix_prob: 0.0
  context_edge_soften_pixels: 4
  context_dilate_pixels: 3
  context_apply_to_pre_and_post_independently: false
  context_preserve_instance_strictly: true
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

model:
  model_type: oracle_mcd_corn
  head_type: corn
  # Optional heavier variant: convnextv2_base (reduce batch_size further when enabled).
  backbone: convnextv2_tiny
  pretrained: true
  dropout: 0.2
  channel_attention_reduction: 16
  ambiguity_hidden_features: 256
  use_context_branch: true
  fuse_local_context_mode: concat_absdiff
  aux_soft_label_head:
    enabled: true
    hidden_dim: 512
    dropout: 0.2
    weight: 0.15
    target_distribution:
      - [0.90, 0.10, 0.00, 0.00]
      - [0.15, 0.65, 0.20, 0.00]
      - [0.00, 0.20, 0.65, 0.15]
      - [0.00, 0.00, 0.10, 0.90]
  ordinal_contrastive:
    enabled: true
    proj_dim: 128
    hidden_dim: 256
    dropout: 0.10
    weight: 0.03
    distance: cosine
    margin_adjacent: 0.45
    margin_far: 0.90
    far_weight: 1.25

training:
  # Mixed-source + ConvNeXtV2 generally needs a lower batch size to avoid OOM.
  batch_size: 8
  epochs: 50
  lr: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 3
  num_workers: 8
  amp: true
  loss_mode: corn_adaptive_tau_safe
  lambda_ord: 0.20
  lambda_uni: 0.10
  lambda_conc: 0.01
  lambda_gap_reg: 0.001
  lambda_tau: 0.01
  lambda_tau_mean: 0.05
  lambda_tau_diff: 0.20
  lambda_tau_rank: 0.05
  lambda_raw_tau_diff: 0.10
  lambda_raw_tau_center: 0.02
  lambda_raw_tau_bound: 0.02
  lambda_corn_soft: 0.03
  fixed_cda_alpha: 0.3
  tau_init: 0.22
  tau_min: 0.12
  tau_max: 0.45
  tau_base: 0.22
  delta_scale: 0.10
  tau_parameterization: bounded_sigmoid
  tau_logit_scale: 2.0
  tau_target: 0.22
  tau_easy: 0.16
  tau_hard: 0.32
  tau_variance_weight: 0.01
  tau_std_floor: 0.03
  tau_rank_margin_difficulty: 0.10
  tau_rank_margin_value: 0.01
  raw_tau_soft_margin: 1.5
  tau_freeze_epochs: 1
  tau_warmup_value: 0.22
  corn_soft_start_epoch: 3
  ambiguity_lr_scale: 0.30
  dual_view_enabled: true
  lambda_view_consistency: 0.03
  lambda_view_severity_consistency: 0.01
  dual_view_stronger_context_prob: 0.20
  enable_ordinal_contrastive: true
  lambda_contrastive: 0.03
  contrastive_temperature: 0.10
  contrastive_proj_dim: 128
  contrastive_hidden_features: 256
  contrastive_dropout: 0.10
  contrastive_distance: cosine
  contrastive_minor_major_weight: 1.75
  contrastive_adjacent_weight: 1.00
  contrastive_far_weight: 1.25
  contrastive_min_positives: 1
  contrastive_loss_warmup_epochs: 1
  enable_corn_soft_emd: true
  lambda_corn_soft_emd: 0.02
  enable_decoded_unimodal_reg: true
  lambda_decoded_unimodal: 0.01
  decoded_unimodal_margin: 0.0
  stage2_head_rebalance_enabled: false
  stage2_epochs: 8
  stage2_lr: 0.0001
  stage2_weight_decay: 0.0001
  stage2_early_stop_patience: 3
  stage2_sampler_mode: class_balanced
  stage2_focus_minor_major_weight: 1.25
  stage2_freeze_trunk: true
  stage2_freeze_ambiguity: true
  stage2_freeze_ordinal: true
  concentration_margin: 0.05
  lambda_aux: 0.2
  label_smoothing: 0.05
  use_focal: false
  focal_gamma: 2.0
  early_stop_patience: 6
  save_topk: 3
  save_epoch_checkpoints: false
  save_every_n_epochs: 1

evaluation:
  split_name: val
  num_visuals_per_class: 8
  enable_threshold_calibration: false
  calibration_type: temperature_plus_bias
  calibration_max_iter: 200
  calibration_lr: 0.01
  fit_calibration_on_val: false
  save_calibration_file: false

output:
  output_root: ./outputs
  exp_name: backbone_upgrade_convnextv2_xbd_bright
