defaults:
  - base.yaml
  - data_xbd.yaml
  - model_vmamba_tau_corn.yaml

experiment:
  name: exp_step2_vmamba

output_dir: /home/lky/code/flowmamba_xbd_pixel_tau_corn_upper/outputs/exp_step2_vmamba
amp: true
num_workers: 2
print_freq: 20
strict_data_check: true

train:
  epochs: 12
  batch_size: 1
  val_batch_size: 1
  lr: 0.0002
  weight_decay: 0.0001
  grad_clip: 1.0
  val_interval: 1
  save_freq: 2
  resume: ""
  finetune_from: ""
  strict_resume_metadata: true
  strict_finetune_metadata: false
  max_train_batches: null
  max_val_batches: null

optimizer:
  name: adamw

scheduler:
  name: cosine
  min_lr: 1.0e-6

loss:
  loc_ce_weight: 1.0
  instance_min_pixels: 32

data:
  augment:
    random_hflip: true
    random_vflip: true
    random_rotate_90: true
    random_resized_crop: true
    random_resized_crop_scale: [0.85, 1.0]
    crop_retry: 8
    min_building_pixels: 512
    min_building_ratio: 0.01
    color_jitter: true

model:
  backend: vmamba
  use_fallback_backbone: false
  fail_if_vmamba_unavailable: true
  pretrained_required: true
  pretrained_strict: false
  lambda_instance: 0.25
  instance_aux_warmup_epochs: 1
  instance_aux_on_val: false
  tau_warmup_epochs: 2
  corn_soft_start_epoch: 4
  lambda_corn_soft: 0.05

validation:
  mode: tiled
  tile_size: [512, 512]
  tile_stride: [384, 384]
  merge_window: hann
  max_debug_images: 8
