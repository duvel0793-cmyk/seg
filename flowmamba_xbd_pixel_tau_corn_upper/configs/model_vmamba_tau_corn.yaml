model:
  backbone_name: vmamba_small
  backend: vmamba
  use_fallback_backbone: false
  fail_if_vmamba_unavailable: true
  pretrained_path: /home/lky/code/flowmamba_xbd_pixel_tau_corn_upper/pretrained/vssm_small_0229_ckpt_epoch_222.pth
  pretrained_key: model
  pretrained_strict: false
  pretrained_required: true
  vmamba_repo: /home/lky/code/VMamba

  decoder_channels: 128
  head_channels: 128

  enable_tau: true
  tau_mode: pixel_corn_safe_v2
  tau_init: 0.03
  tau_min: -0.02
  tau_max: 0.18
  tau_target: 0.03
  tau_easy: 0.00
  tau_hard: 0.12
  tau_std_floor: 0.05
  tau_warmup_epochs: 1
  tau_per_boundary: true
  tau_hidden_channels: 64
  tau_detach_features: true
  tau_detach_logits: true
  lambda_tau_reg: 0.001
  lambda_tau_mean: 0.001
  lambda_tau_diff: 0.005
  lambda_tau_rank: 0.001
  lambda_raw_tau_center: 0.001
  lambda_raw_tau_bound: 0.0005
  raw_tau_bound: 4.0
  difficulty_bins: 5
  corn_soft_start_epoch: 2
  lambda_corn_soft: 0.05
  soft_target_detach: true
  soft_target_max_mix: 0.35

  instance_pool_source: both
  instance_feature_channels: 128
  instance_head_channels: 128
  lambda_instance: 0.2
  instance_aux_warmup_epochs: 1
  instance_aux_on_val: false

  backbone_kwargs:
    patch_size: 4
    in_chans: 3
    num_classes: 1000
    depths: [2, 2, 15, 2]
    dims: 96
    ssm_d_state: 1
    ssm_ratio: 2.0
    ssm_rank_ratio: 2.0
    ssm_dt_rank: auto
    ssm_act_layer: silu
    ssm_conv: 3
    ssm_conv_bias: false
    ssm_drop_rate: 0.0
    ssm_init: v0
    forward_type: v05_noz
    mlp_ratio: 4.0
    mlp_act_layer: gelu
    mlp_drop_rate: 0.0
    drop_path_rate: 0.3
    patch_norm: true
    norm_layer: ln2d
    downsample_version: v3
    patchembed_version: v2
    gmlp: false
    use_checkpoint: false
  fallback:
    channels: [32, 64, 128, 256]
