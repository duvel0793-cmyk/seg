defaults:
  - base.yaml
  - data_xbd.yaml
  - model_vmamba_tau_corn.yaml

experiment:
  name: exp_step1_vmamba

output_dir: /home/lky/code/flowmamba_xbd_pixel_tau_corn_upper/outputs/exp_step1_vmamba

train:
  epochs: 1
  batch_size: 1
  val_batch_size: 1
  lr: 0.0002
  weight_decay: 0.0001
  grad_clip: 1.0
  val_interval: 1
  resume: ""
  max_train_batches: 2
  max_val_batches: 1

optimizer:
  name: adamw

scheduler:
  name: cosine
  min_lr: 1.0e-6

loss:
  loc_ce_weight: 1.0
  instance_min_pixels: 16

model:
  backend: vmamba
  use_fallback_backbone: false
  fail_if_vmamba_unavailable: true
  pretrained_required: true

smoke_test:
  num_train_batches: 2
  num_val_batches: 1
