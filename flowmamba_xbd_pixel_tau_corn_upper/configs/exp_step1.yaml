defaults:
  - base.yaml
  - data_xbd.yaml
  - model_vmamba_tau_corn.yaml

experiment:
  name: exp_step1

train:
  epochs: 1
  batch_size: 2
  val_batch_size: 2
  lr: 0.0002
  weight_decay: 0.0001
  grad_clip: 1.0
  val_interval: 1
  resume: ""
  max_train_batches: 2
  max_val_batches: 1

optimizer:
  name: adamw

scheduler:
  name: cosine
  min_lr: 1.0e-6

loss:
  loc_ce_weight: 1.0
  instance_min_pixels: 16

smoke_test:
  num_train_batches: 2
  num_val_batches: 1
