project_name: oracle-instance-damage-classification_convnext_mcd_corn

data:
  root: /home/lky/data/xBD
  train_split: train
  val_split: val
  test_split: test
  image_size: 224
  crop_context_ratio: 0.2
  min_crop_size: 64
  min_polygon_area: 16.0
  min_mask_pixels: 16
  max_out_of_bound_ratio: 0.4
  num_workers: 4
  allow_tier3: false

augmentation:
  hflip_prob: 0.5
  vflip_prob: 0.5
  rotate90_prob: 0.5
  random_resized_crop_prob: 0.35
  random_resized_crop_scale: [0.9, 1.0]
  random_resized_crop_ratio: [0.95, 1.05]
  min_mask_retention: 0.7
  color_jitter_prob: 0.5
  brightness: 0.15
  contrast: 0.15
  saturation: 0.1
  hue: 0.02
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

model:
  model_type: convnext_mcd_corn
  backbone: convnext_tiny
  pretrained: true
  pretrained_path: /home/lky/code/oracle-instance-damage-classification_convnext_mcd_corn/pretrained/convnext/convnext_tiny_1k_224_ema.pth
  pretrained_url: https://dl.fbaipublicfiles.com/convnext/convnext_tiny_1k_224_ema.pth
  auto_download_pretrained: true
  use_4ch_stem: false
  use_mask_gating: true
  mask_gate_strength: 0.2
  return_multiscale: true
  fusion_type: simple_bidirectional
  pooling_type: masked_multiscale
  num_classes: 4
  loss_mode: corn_adaptive_tau_safe
  ce_weight: 0.3
  corn_weight: 1.0
  tau_reg_weight: 0.05
  tau_min: 0.85
  tau_max: 1.15
  tau_init: 1.0
  freeze_tau_epochs: 3
  threshold_candidates: [0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9]
  detach_tau_input: true
  drop_path_rate: 0.1
  dropout: 0.2
  mlp_hidden_dim: 512

train:
  batch_size: 8
  epochs: 30
  lr: 5.0e-5
  backbone_lr_scale: 0.1
  head_lr_scale: 1.0
  weight_decay: 0.05
  amp: true
  grad_clip: 5.0
  seed: 42
  use_weighted_sampler: true
  sampler_power: 0.10
  class_sample_weight_scale:
    no-damage: 1.0
    minor-damage: 0.6
    major-damage: 1.0
    destroyed: 1.0
  save_best_metric: calibrated_macro_f1
  early_stopping_patience: 8

eval:
  use_threshold_calibration: true
  decode_mode: threshold_count

output:
  root: /home/lky/code/oracle-instance-damage-classification_convnext_mcd_corn/outputs
  exp_name: default

