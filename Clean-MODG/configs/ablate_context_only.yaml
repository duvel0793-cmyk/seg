project:
  name: Clean-MODG
  output_dir: outputs/ablate_context_only

data:
  manifest_path: /home/lky/code/Clean-MODG/data/manifest.csv
  image_root: ""
  split_train: train
  split_val: val
  split_test: test
  tight_size: 256
  context_size: 256
  tight_padding_ratio: 0.15
  context_padding_ratio: 1.0
  use_mask: true
  mask_mode: mask_pooling
  normalize: imagenet
  augment: true
  batch_size: 32
  num_workers: 4

model:
  name: single_scale
  scale: context
  backbone: convnextv2_tiny
  pretrained: true
  pretrained_path: /home/lky/code/Clean-MODG/weights/convnextv2_tiny_22k_224_ema.pt
  in_chans: 3
  fusion_dim: 512
  dropout: 0.2
  use_mask_pooling: true
  use_binary_aux: false
  use_neighborhood: false

loss:
  type: corn
  num_classes: 4
  lambda_binary: 0.0

train:
  epochs: 100
  lr: 0.0001
  weight_decay: 0.05
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 5
  seed: 42
  amp: true
  grad_clip: 1.0
  save_every: 10
  early_stop_patience: 20

eval:
  main_metric: macro_f1
  save_confusion: true
