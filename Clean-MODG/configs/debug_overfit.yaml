project:
  name: Clean-MODG
  output_dir: outputs/debug_overfit

data:
  manifest_path: /home/lky/code/Clean-MODG/data/manifest.csv
  image_root: ""
  split_train: train
  split_val: val
  split_test: test
  tight_size: 256
  context_size: 256
  tight_padding_ratio: 0.15
  context_padding_ratio: 1.0
  use_mask: true
  mask_mode: mask_pooling
  normalize: imagenet
  augment: false
  batch_size: 4
  num_workers: 0
  overfit_n_samples: 16

model:
  name: clean_dual_scale
  backbone: convnextv2_tiny
  pretrained: false
  in_chans: 3
  shared_backbone: true
  scales: ["tight", "context"]
  fusion: concat_mlp
  feature_dim: 768
  fusion_dim: 512
  dropout: 0.1
  use_mask_pooling: true
  use_local_window_attention: false
  use_binary_aux: false
  use_neighborhood: false
  use_alignment: false
  use_damage_aware_block: false
  use_adaptive_tau: false

loss:
  type: corn
  num_classes: 4
  lambda_binary: 0.0

train:
  epochs: 50
  lr: 0.0001
  weight_decay: 0.01
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 1
  seed: 42
  amp: false
  grad_clip: 1.0
  save_every: 10
  early_stop_patience: 50

eval:
  main_metric: macro_f1
  save_confusion: true
